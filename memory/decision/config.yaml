name: decision
collection: memory_decision
enabled: true

description: |
  Architectural decisions, design choices, technical constraints, 
  and rationale that should persist across sessions.

triggers:
  - pattern: "We decided to"
  - pattern: "The decision is"
  - pattern: "Let's go with"
  - pattern: "Choosing between"

embedding:
  model: openai/text-embedding-3-small
  dimensions: 1536

storage:
  maxTokens: 2000
  priority: high
  
retrieval:
  # Search context window around memory
  contextRadius: 3
  # Max results per query
  maxResults: 10
  # Minimum relevance score (0-1)
  minRelevance: 0.7
